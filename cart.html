<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>عربة التسوق · جميع المشتريات</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.rtl.min.css"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bungee&family=Cairo:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" href="./images/logo.jpeg" />
    <link rel="stylesheet" href="cart.css" />
  </head>
  <body>
    <div class="container">
      <!-- build simple header -->
      <nav class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="cart-title display-5 fw-bold">
          <span class="badge-yellow ms-2">🛒</span> عربة المشتريات
        </h1>
        <div class="text-muted">Built By ZOZ UI</div>
      </nav>

      <div class="row g-4">
        <div class="col-lg-8" id="parentElement">
          <!-- when the cart will be empty -->
        </div>

        <!-- sumrrray of orader -->
        <div class="col-lg-4">
          <div class="cart-summary p-4 position-sticky" style="top: 20px">
            <h4
              class="border-bottom pb-2 mb-3"
              style="color: var(--danger-color)"
            >
              ملخص الطلب
            </h4>
            <div class="d-flex justify-content-between mb-2">
              <span>المجموع الفرعي</span>
              <span id="subtotal" class="fw-bold">0000</span> <span>ج</span>
            </div>
            <div class="d-flex justify-content-between mb-2">
              <span>الشحن</span>
              <span id="typeOfShipping">مجاني</span>
            </div>
            <hr class="bg-light" />
            <div class="d-flex justify-content-between total-label mb-3">
              <span class="h5">الإجمالي</span>
              <span class="h5" id="totalAmount">0000</span>
              <span class="h5">ج</span>
            </div>
            <button class="checkout-btn" id="checkoutBtn">
              إتمام الشراء ✅
            </button>
            <p class="small text-secondary mt-3 text-center">
              *الدفع عند الاستلام متاح
            </p>
          </div>
        </div>
      </div>

      <footer>
        <span>الهيا · جميع المنتجات أصلية</span>
      </footer>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="cart.js"></script>
  </body>
</html>
